<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LightCall – Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">

  <h1>LightCall</h1>

  <div id="auth-forms">

    <!-- Formulaire de connexion -->
    <div id="login-form">
      <h2>Connexion</h2>
      <input id="login-username" type="text" placeholder="Nom d'utilisateur">
      <input id="login-password" type="password" placeholder="Mot de passe">
      <button id="login-btn">Se connecter</button>
      <p>Pas de compte ? <span id="show-register">Créer un compte</span></p>
    </div>

    <!-- Formulaire d'inscription -->
    <div id="register-form" class="hidden">
      <h2>Créer un compte</h2>
      <input id="register-username" type="text" placeholder="Nom d'utilisateur">
      <input id="register-password" type="password" placeholder="Mot de passe">
      <button id="register-btn">S'inscrire</button>
      <p>Déjà un compte ? <span id="show-login">Se connecter</span></p>
    </div>

  </div>

</div>

<script src="auth.js"></script>

</body>
</html>
